# Change Prefix to Ctrl+t
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split windows
bind v split-window -v -c "#{pane_current_path}"
bind g split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (works with vim-tmux-navigator plugin)
# Ctrl+h/j/k/l - no prefix needed!
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# EASY pane resizing - Ctrl+Shift+h/j/k/l (NO PREFIX!)
bind -n C-S-h resize-pane -L 5
bind -n C-S-j resize-pane -D 5
bind -n C-S-k resize-pane -U 5
bind -n C-S-l resize-pane -R 5

# Copy mode - Vi-style
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
