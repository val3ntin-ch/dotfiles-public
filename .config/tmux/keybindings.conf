# Change prefix to Ctrl+t
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split windows
bind v split-window -v -c "#{pane_current_path}"
bind g split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation — prefix + hjkl (vim-tmux-navigator handles Ctrl+hjkl without prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize — no prefix, Ctrl+Shift+hjkl
bind -n C-S-h resize-pane -L 5
bind -n C-S-j resize-pane -D 5
bind -n C-S-k resize-pane -U 5
bind -n C-S-l resize-pane -R 5

# Copy mode — vi-style
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
# Linux: bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Session manager — sesh (prefix + o)
bind o run "sesh connect $(
  sesh list --icons |
  fzf-tmux -p 80%,70% \
    --reverse \
    --border-label ' sesh ' \
    --no-sort \
    --ansi \
    --preview 'sesh preview {}' \
    --preview-window 'right:40%'
)"
