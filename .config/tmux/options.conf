# General
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi
set -g status-keys vi

# Fix Vim ESC delay
set -sg escape-time 0

# Focus events for vim autoread
set -g focus-events on

# Aggressive resize for multi-client
setw -g aggressive-resize on

# Status messages visible long enough to read
set -g display-time 2000

# Pane borders (fallback if catppuccin plugin not loaded)
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# History
set -g history-limit 1000000

# Indexing — start at 1, close gaps on window close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Status bar position
set-option -g status-position top

# Yazi image preview — pass terminal graphics protocol through tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
