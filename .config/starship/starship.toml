"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = 'catppuccin_mocha'
command_timeout = 1000

# username+hostname only appear on SSH or when root — silent otherwise
format = """$username$hostname$directory$character"""

# right: infra context → git → languages → duration
right_format = """$git_branch$git_status$docker_context$kubernetes$aws$conda$package$nodejs$bun$swift$dart$rust$golang$python$java$kotlin$terraform$cmd_duration$time"""

# ── Shell context (SSH / root only) ───────────────────────────────────────────
[username]
show_always = false
style_user = "bold fg:blue"
style_root = "bold fg:red"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "bold fg:green"
format = "[$hostname]($style) "

# ── Directory ─────────────────────────────────────────────────────────────────
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = ""
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = '⇡$count'
behind = '⇣$count'
diverged = '⇕⇡$ahead_count⇣$behind_count'
conflicted = '=$count'
untracked = '?$count'
stashed = '*$count'
modified = '!$count'
staged = '+$count'
deleted = '✘$count'
style = 'bold yellow'

# ── Infra / cloud (only shows when context is active) ─────────────────────────
[docker_context]
symbol = " "
style = "bold fg:blue"
format = '[$symbol$context]($style) '
only_with_files = false

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bold fg:blue"
format = '[$symbol$context( \($namespace\))]($style) '

[aws]
symbol = "󰅟 "
style = "bold fg:peach"
format = '[$symbol$profile( \($region\))]($style) '

[terraform]
symbol = "󱁢 "
style = "bold fg:mauve"
format = '[$symbol$workspace]($style) '

# ── Package version (shows in project root) ───────────────────────────────────
[package]
symbol = "󰏗 "
style = "bold fg:peach"
format = '[$symbol$version]($style) '

# ── Languages (auto-hide — only show in relevant dirs) ────────────────────────
[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[swift]
symbol = ""
style = "bg:peach"
format = '[[ $symbol( $version) ](fg:crust bg:peach)]($style)'

[dart]
symbol = ""
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol $virtualenv( $version) ](fg:crust bg:green)]($style)'

[conda]
symbol = "󰾺 "
style = "bold fg:green"
format = '[$symbol$environment]($style) '
ignore_base = false

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❯v!❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

# ── Timing ────────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = '[$duration]($style) '
style = 'bold yellow'

[time]
disabled = false
time_format = "%H:%M"
style = "bold fg:overlay1"
format = '[$time]($style)'

# ── Neon Cyberpunk palette (testing) ─────────────────────────────────────────
[palettes.neon_cyberpunk]
cyan = "#00F5FF"
blue = "#00A3FF"
magenta = "#FF00FF"
purple = "#BD00FF"
green = "#7CFF00"
