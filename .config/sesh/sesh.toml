# sesh — tmux session manager
# Docs: https://github.com/joshmedeski/sesh
#
# These are pinned sessions that always appear at the top of the picker,
# regardless of whether they're currently running.
# Zoxide dirs + active tmux sessions fill the rest automatically.

[[session]]
name = "dotfiles"
path = "~/.dotfiles"
startup_command = "nvim"

[[session]]
name = "config"
path = "~/.config"
